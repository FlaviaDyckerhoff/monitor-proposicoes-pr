name: Monitor Proposições PR

env:
  TZ: America/Sao_Paulo

on:
  workflow_dispatch:
    inputs:
      api_data_inicial:
        description: 'Data inicial da janela ALEP (YYYY-MM-DD)'
        required: false
      api_data_final:
        description: 'Data final da janela ALEP (YYYY-MM-DD)'
        required: false
      tipos_incluir:
        description: 'Tipos para enviar, separados por virgula'
        required: false
      enviar_apenas_desde:
        description: 'Enviar apenas itens a partir desta data (YYYY-MM-DD)'
        required: false
      marcar_excluidos_como_vistos:
        description: 'Marcar itens fora do recorte como vistos sem email'
        required: false
        default: '0'
      email_assunto_prefixo:
        description: 'Prefixo opcional do assunto'
        required: false

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Executar monitor
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          CONTROLE03_API_USER: ${{ secrets.CONTROLE03_API_USER }}
          CONTROLE03_API_PASS: ${{ secrets.CONTROLE03_API_PASS }}
          CONTROLE03_STATE_URL: ${{ secrets.CONTROLE03_STATE_URL }}
          API_DATA_INICIAL: ${{ github.event.inputs.api_data_inicial }}
          API_DATA_FINAL: ${{ github.event.inputs.api_data_final }}
          TIPOS_INCLUIR: ${{ github.event.inputs.tipos_incluir }}
          ENVIAR_APENAS_DESDE: ${{ github.event.inputs.enviar_apenas_desde }}
          MARCAR_EXCLUIDOS_COMO_VISTOS: ${{ github.event.inputs.marcar_excluidos_como_vistos }}
          EMAIL_ASSUNTO_PREFIXO: ${{ github.event.inputs.email_assunto_prefixo }}
        run: node monitor.js

      - name: Salvar estado atualizado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f estado.json ]; then
            echo '{"proposicoes_vistas":[],"ultima_execucao":""}' > estado.json
          fi
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado [skip ci]"
          git push
